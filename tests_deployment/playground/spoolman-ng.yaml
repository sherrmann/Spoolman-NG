# Overlay for the prind stack (https://github.com/mkuf/prind): swap upstream
# Spoolman for Spoolman NG and move traefik off host port 80. Applied by up.sh
# on top of prind's docker-compose.yaml + docker-compose.extra.simulavr.yaml.
services:
  spoolman:
    image: ghcr.io/sherrmann/spoolman-ng:${SPOOLMAN_NG_TAG:-latest}
  traefik:
    ports: !override
      - "${PLAYGROUND_HTTP_PORT:-8010}:80"
