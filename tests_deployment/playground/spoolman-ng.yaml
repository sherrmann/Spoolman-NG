# Overlay for the prind stack (https://github.com/mkuf/prind): swap upstream
# Spoolman for Spoolman NG and move traefik off host port 80. Applied by up.sh
# on top of prind's docker-compose.yaml + docker-compose.extra.simulavr.yaml.
services:
  spoolman:
    image: ghcr.io/sherrmann/spoolman-ng:${SPOOLMAN_NG_TAG:-latest}
  traefik:
    # Constrained to this compose project: traefik's docker provider watches the
    # whole host socket, so two playground stacks (e.g. the interactive one and the
    # runtime e2e's isolated copy) would otherwise discover each other's identically
    # labelled containers and round-robin onto unreachable networks.
    command: !override
      - "--accesslog"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.constraints=Label(`com.docker.compose.project`, `${PLAYGROUND_PROJECT:-spoolman-playground}`)"
      - "--entrypoints.web.address=:80"
    ports: !override
      - "${PLAYGROUND_HTTP_PORT:-8010}:80"
