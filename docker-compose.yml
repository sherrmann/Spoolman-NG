services:
  spoolman:
    image: ghcr.io/sherrmann/spoolman-ng:latest # Also on Docker Hub: cookiemonster95/spoolman-ng:latest
    restart: unless-stopped
    volumes:
      - ./data:/home/app/.local/share/spoolman # Do NOT modify /home/app/.local/share/spoolman target
    ports:
      - "7912:8000"
    environment:
      - TZ=Europe/Stockholm # Optional, defaults to UTC
      # Server-side USB NFC reader (optional). See docs/nfc.md.
      # - SPOOLMAN_NFC_ENABLED=TRUE
    # Pass a USB NFC reader through to the container (needed with SPOOLMAN_NFC_ENABLED). See docs/nfc.md.
    # devices:
    #   - /dev/bus/usb:/dev/bus/usb
