name: Mobile APK

# Builds the Android companion app (mobile/) as an installable release APK.
# Runs standalone via workflow_dispatch (grab the APK from the run's
# artifacts), and is called by ci.yml on release tags so the APK is attached
# to the GitHub release.
#
# Signing: the Expo-generated project signs release builds with the standard
# Android debug keystore — installable and signature-stable across builds (so
# updates apply cleanly), but the key is publicly known, which is acceptable
# only for a sideloaded proof of concept. To sign with a private key instead,
# set the ANDROID_DEBUG_KEYSTORE_B64 repository secret to the base64 of a
# keystore that uses the same credentials the generated Gradle config expects:
#
#   keytool -genkeypair -v -keystore companion.keystore -alias androiddebugkey \
#     -storepass android -keypass android -keyalg RSA -keysize 2048 \
#     -validity 10000 -dname "CN=Spoolman Companion"
#   base64 -w0 companion.keystore    # -> value of ANDROID_DEBUG_KEYSTORE_B64
#
# Note: switching keystores changes the app signature — already-installed
# copies must be uninstalled once before they accept the differently-signed
# update.

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      EXPO_NO_TELEMETRY: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'

      - name: Install JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install mobile dependencies
        run: |
          cd mobile
          npm ci

      # Stamp the release tag into the app so the in-app updater can compare its
      # own version against the latest GitHub release. Only tag builds (vX.Y.Z)
      # are stamped; workflow_dispatch/branch builds keep app.json's dev version.
      - name: Stamp the release version into the app
        run: |
          cd mobile
          ref_name="${GITHUB_REF_NAME}"
          case "$ref_name" in
            v[0-9]*)
              VER="${ref_name#v}" node -e '
                const fs = require("fs");
                const cfg = JSON.parse(fs.readFileSync("app.json", "utf8"));
                const ver = process.env.VER;
                const [a = 0, b = 0, c = 0] = ver.split(".").map((n) => parseInt(n, 10) || 0);
                cfg.expo.version = ver;
                cfg.expo.android = cfg.expo.android || {};
                cfg.expo.android.versionCode = a * 10000 + b * 100 + c;
                fs.writeFileSync("app.json", JSON.stringify(cfg, null, 2) + "\n");
                console.log("Stamped version " + ver + " (versionCode " + cfg.expo.android.versionCode + ")");
              '
              ;;
            *)
              echo "Non-tag build ($ref_name) — keeping the dev version in app.json."
              ;;
          esac

      - name: Generate the native Android project
        run: |
          cd mobile
          npx expo prebuild --platform android --no-install

      - name: Use the private signing keystore when configured
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_B64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > mobile/android/app/debug.keystore
            echo "Signing with the private keystore from ANDROID_DEBUG_KEYSTORE_B64."
          else
            echo "No ANDROID_DEBUG_KEYSTORE_B64 secret set; the APK carries the well-known debug signature."
          fi

      - name: Build release APK
        run: |
          cd mobile/android
          ./gradlew --no-daemon assembleRelease

      - name: Name the APK after the ref
        run: |
          mkdir -p /tmp/companion-apk
          ref_name="${GITHUB_REF_NAME//\//-}"
          cp mobile/android/app/build/outputs/apk/release/app-release.apk \
            "/tmp/companion-apk/spoolman-companion-${ref_name}.apk"

      # Passkeys (WebAuthn) in the WebView use FOR_APP mode, which needs the
      # relying-party domain to host a Digital Asset Links file naming this app
      # and its signing certificate. Print that fingerprint and a ready-to-host
      # assetlinks.json so a user with any keystore knows exactly what to serve.
      - name: Emit signing fingerprint + assetlinks.json for passkeys
        run: |
          apk="mobile/android/app/build/outputs/apk/release/app-release.apk"
          apksigner=$(ls "$ANDROID_HOME"/build-tools/*/apksigner 2>/dev/null | sort -V | tail -1)
          fp=$("$apksigner" verify --print-certs "$apk" 2>/dev/null \
            | awk -F': ' '/SHA-256/{print toupper($2); exit}' \
            | sed 's/\(..\)/\1:/g; s/:$//')
          pkg=$(node -e "console.log(require('./mobile/app.json').expo.android.package)")
          {
            echo "### Passkeys: Digital Asset Links"
            echo ""
            echo "Host this at \`https://<your-SSO-domain>/.well-known/assetlinks.json\`"
            echo "(the domain must match your IdP's WebAuthn RP ID):"
            echo ""
            echo '```json'
            echo "[{\"relation\":[\"delegate_permission/common.get_login_creds\"],\"target\":{\"namespace\":\"android_app\",\"package_name\":\"${pkg}\",\"sha256_cert_fingerprints\":[\"${fp}\"]}}]"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
        continue-on-error: true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: companion-apk
          path: /tmp/companion-apk/*.apk
          if-no-files-found: error
