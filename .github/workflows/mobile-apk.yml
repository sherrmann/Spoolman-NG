name: Mobile APK

# Builds the Android companion app (mobile/) as an installable release APK.
# Runs standalone via workflow_dispatch (grab the APK from the run's
# artifacts), and is called by ci.yml on release tags so the APK is attached
# to the GitHub release.
#
# Signing: the Expo-generated project signs release builds with the standard
# Android debug keystore — installable and signature-stable across builds (so
# updates apply cleanly), but the key is publicly known, which is acceptable
# only for a sideloaded proof of concept. To sign with a private key instead,
# set the ANDROID_DEBUG_KEYSTORE_B64 repository secret to the base64 of a
# keystore that uses the same credentials the generated Gradle config expects:
#
#   keytool -genkeypair -v -keystore companion.keystore -alias androiddebugkey \
#     -storepass android -keypass android -keyalg RSA -keysize 2048 \
#     -validity 10000 -dname "CN=Spoolman Companion"
#   base64 -w0 companion.keystore    # -> value of ANDROID_DEBUG_KEYSTORE_B64
#
# Note: switching keystores changes the app signature — already-installed
# copies must be uninstalled once before they accept the differently-signed
# update.

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      EXPO_NO_TELEMETRY: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'

      - name: Install JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install mobile dependencies
        run: |
          cd mobile
          npm ci

      - name: Generate the native Android project
        run: |
          cd mobile
          npx expo prebuild --platform android --no-install

      - name: Use the private signing keystore when configured
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_B64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > mobile/android/app/debug.keystore
            echo "Signing with the private keystore from ANDROID_DEBUG_KEYSTORE_B64."
          else
            echo "No ANDROID_DEBUG_KEYSTORE_B64 secret set; the APK carries the well-known debug signature."
          fi

      - name: Build release APK
        run: |
          cd mobile/android
          ./gradlew --no-daemon assembleRelease

      - name: Name the APK after the ref
        run: |
          mkdir -p /tmp/companion-apk
          ref_name="${GITHUB_REF_NAME//\//-}"
          cp mobile/android/app/build/outputs/apk/release/app-release.apk \
            "/tmp/companion-apk/spoolman-companion-${ref_name}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: companion-apk
          path: /tmp/companion-apk/*.apk
          if-no-files-found: error
