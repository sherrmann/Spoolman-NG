name: Generate and deploy API documentation

on:
  # Deploy on master pushes that can change the rendered API docs. Two dead ends inform
  # this trigger: `release: published` never fires because ci.yml creates the release with
  # the default GITHUB_TOKEN (whose events don't trigger workflows), and a `push: tags`
  # trigger is rejected by the github-pages environment's protection rules, which only
  # allow deployments from master (the v2026.7.6 run failed in 2s with no logs). The
  # release bump always touches pyproject.toml on master, so every release still redeploys
  # the docs — from a ref the environment accepts.
  push:
    branches:
      - master
    paths:
      - "spoolman/api/**"
      - "pyproject.toml"
      - ".github/workflows/apidocs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.26"
      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"
      - name: Install Poe the Poet
        run: uv tool install poethepoet
      - run: uv sync
      - run: poe generate-docs
      - name: Setup Pages
        uses: actions/configure-pages@v6.0.0
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: "docs/"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
