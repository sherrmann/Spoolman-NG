name: CI

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master

permissions:
  contents: read
  packages: read

env:
  # Use the fork owner's namespace so build-cache and image pushes go to a
  # registry this repo can write to. (GHCR image names must be lowercase;
  # github.repository_owner is lowercase for this fork.)
  GHCR_IMAGE: ${{ github.repository_owner }}/spoolman-ng

jobs:
  #
  # Detect the redundant CI run that happens when the version bump pushes
  # `master` and the matching `vX.Y.Z` tag in one atomic push: GitHub fires a
  # run for the branch ref and a run for the tag ref on the same commit. The tag
  # run does the full build + publish + release, so the duplicate branch run
  # skips everything below.
  #
  meta:
    runs-on: ubuntu-latest
    outputs:
      skip_build: ${{ steps.check.outputs.skip_build }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for a release tag on this commit
        id: check
        run: |
          if [ "$GITHUB_REF_TYPE" = "branch" ] && git tag --points-at HEAD | grep -q '^v'; then
            echo "skip_build=true" >> "$GITHUB_OUTPUT"
            echo "Commit is tagged for release; the tag run handles the build. Skipping this duplicate branch run."
          else
            echo "skip_build=false" >> "$GITHUB_OUTPUT"
          fi
  #
  # Linting
  #
  style:
    needs: [meta]
    if: ${{ needs.meta.outputs.skip_build != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.26"

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install client dependencies
        run: |
          cd client
          npm ci

      - name: Run pre-commit
        run: uv run lefthook run ci
  #
  # Fast (non-Docker) Python unit tests + coverage
  #
  unit-tests:
    needs: [meta]
    if: ${{ needs.meta.outputs.skip_build != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.26"

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Run unit tests
        run: uv run pytest tests/ --cov=spoolman --cov-branch --cov-report=term-missing
  #
  # Frontend unit tests (Vitest). See TESTING_STRATEGY.md.
  #
  client-tests:
    needs: [meta]
    if: ${{ needs.meta.outputs.skip_build != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'

      - name: Install client dependencies
        run: |
          cd client
          npm ci

      - name: Run client unit tests
        run: |
          cd client
          npm run test:coverage
  #
  # Mobile companion app (mobile/): typecheck + pure-logic unit tests. Native
  # Android/iOS builds are deliberately not part of PR CI (slow, SDK-heavy) —
  # see docs/mobile-companion-app.md.
  #
  mobile-tests:
    needs: [meta]
    if: ${{ needs.meta.outputs.skip_build != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'

      - name: Install mobile dependencies
        run: |
          cd mobile
          npm ci

      - name: Typecheck mobile app
        run: |
          cd mobile
          npm run typecheck

      - name: Run mobile unit tests
        run: |
          cd mobile
          npm test
  #
  # Browser e2e for the PWA service-worker / manifest base-path flows (#93, #95).
  # Serves the built client through the real backend SinglePageApplication
  # (client/e2e/serve.py) and drives it with Playwright/Chromium at both a root
  # and a /spoolman sub-path deploy. See TESTING_STRATEGY.md §4.
  #
  e2e:
    needs: [meta]
    if: ${{ needs.meta.outputs.skip_build != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.26"

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Sync Python deps
        # The e2e serving harness (client/e2e/serve.py) needs uvicorn/starlette/fastapi.
        run: uv sync

      - name: Install client dependencies
        run: |
          cd client
          npm ci

      - name: Build client
        run: |
          cd client
          rm -f .env && echo "VITE_APIURL=/api/v1" > .env.production
          npm run build

      - name: Install Playwright browser
        # Fetches the Chromium build matched to the pinned @playwright/test version.
        run: |
          cd client
          npx playwright install --with-deps chromium

      - name: Run Playwright e2e
        run: |
          cd client
          npm run test:e2e

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: playwright-report
          path: client/playwright-report
          retention-days: 7
  #
  # Static analysis with CodeQL
  #
  codeql:
    needs: [meta]
    if: ${{ needs.meta.outputs.skip_build != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ["python", "javascript-typescript"]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
  #
  # Lint the Dockerfile with hadolint
  #
  hadolint:
    needs: [meta]
    if: ${{ needs.meta.outputs.skip_build != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ./Dockerfile
  #
  # Build the Spoolman client for the release artifacts (the zip consumed by native installs
  # and Moonraker updates). The docker images build their own client inside the Dockerfile
  # (#111); this job also acts as an early, cheap gate for the image builds that need it.
  #
  build-client:
    needs: [meta]
    if: ${{ needs.meta.outputs.skip_build != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.26"

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"
    
      - name: Install client dependencies
        run: |
          cd client
          npm ci

      - name: Build
        run: |
          cd client
          rm -f .env && echo "VITE_APIURL=/api/v1" > .env.production
          npm run build

      - name: Write build info
        run: |
          echo "GIT_COMMIT=$(git rev-parse --short HEAD)" > build.txt
          echo "BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> build.txt
  
      # Remove client source and keep only the built dist
      - name: Clean
        run: |
          mv client/dist dist
          rm -rf client
          mkdir client
          mv dist client/dist
          rm -rf .git
          rm -rf .venv

      - name: Fix permissions
        run: |
          chmod +x scripts/*.sh
      
      - name: Upload client Spoolman artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: client
          path: client/dist

      - name: Upload full Spoolman artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          include-hidden-files: true
          name: spoolman
          path: .
  #
  # Build native image for integration tests
  #
  build-amd64:
    needs: [build-client]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to the Github Container registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Spoolman
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          tags: spoolman:test
          outputs: type=docker,dest=/tmp/spoolman.tar
          cache-from: type=registry,ref=ghcr.io/${{ env.GHCR_IMAGE }}:buildcache-amd64
          cache-to: type=registry,ref=ghcr.io/${{ env.GHCR_IMAGE }}:buildcache-amd64,mode=max

      # Separate build for pull requests since PRs dont have access to store cache
      - name: Build Spoolman (PR)
        if: ${{ github.event_name == 'pull_request' }}
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          tags: spoolman:test
          outputs: type=docker,dest=/tmp/spoolman.tar
          cache-from: type=registry,ref=ghcr.io/${{ env.GHCR_IMAGE }}:buildcache-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: spoolman-image
          path: /tmp/spoolman.tar
  #
  # Build tester image for integration tests
  #
  build-tester:
    needs: [meta]
    if: ${{ needs.meta.outputs.skip_build != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to the Github Container registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Spoolman Tester
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./tests_integration
          tags: spoolman-tester:latest
          outputs: type=docker,dest=/tmp/spoolman-tester.tar
          cache-from: type=registry,ref=ghcr.io/${{ env.GHCR_IMAGE }}:buildcache-tester
          cache-to: type=registry,ref=ghcr.io/${{ env.GHCR_IMAGE }}:buildcache-tester,mode=max

      # Separate build for pull requests since PRs dont have access to store cache
      - name: Build Spoolman Tester (PR)
        if: ${{ github.event_name == 'pull_request' }}
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./tests_integration
          tags: spoolman-tester:latest
          outputs: type=docker,dest=/tmp/spoolman-tester.tar
          cache-from: type=registry,ref=ghcr.io/${{ env.GHCR_IMAGE }}:buildcache-tester

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: spoolman-tester-image
          path: /tmp/spoolman-tester.tar
  #
  # Perform integration tests
  #
  test:
    needs: [build-amd64, build-tester]
    strategy:
      matrix:
        dbtype: ["postgres", "sqlite", "mariadb", "cockroachdb"]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download built images
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: spoolman*-image
          path: /tmp

      - name: Load built images
        run: |
          docker load --input /tmp/spoolman-image/spoolman.tar
          docker load --input /tmp/spoolman-tester-image/spoolman-tester.tar

      - name: Perform integration tests
        uses: hoverkraft-tech/compose-action@v3.0.0
        with:
          compose-file: "./tests_integration/docker-compose-${{ matrix.dbtype }}.yml"
          up-flags: "--abort-on-container-exit"
          down-flags: "--volumes"
  #
  # Build the arm64 image, then boot it under QEMU and hit the health endpoint.
  # Like build-armv7, arm64 is otherwise only built (never run) in CI, so a
  # dependency bump could break the published image with nothing noticing. Runs
  # on pull requests too (build only caches/publishes on push).
  #
  build-arm64:
    needs: [build-client]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7


      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to the Github Container registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and cache Docker image
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          platforms: linux/arm64
          tags: spoolman:arm64
          load: true
          cache-from: type=registry,ref=ghcr.io/${{ env.GHCR_IMAGE }}:buildcache-arm64
          cache-to: type=registry,ref=ghcr.io/${{ env.GHCR_IMAGE }}:buildcache-arm64,mode=max

      # Pull requests can't write the registry build cache, so build cache-from only.
      - name: Build Docker image (PR)
        if: ${{ github.event_name == 'pull_request' }}
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          platforms: linux/arm64
          tags: spoolman:arm64
          load: true
          cache-from: type=registry,ref=ghcr.io/${{ env.GHCR_IMAGE }}:buildcache-arm64

      # Boot the image under emulation and wait for the API to answer — startup
      # migrations and native wheels exercised on arm64 against the default SQLite DB.
      - name: Smoke-test the arm64 image
        run: |
          docker run -d --name spoolman-arm64 --platform linux/arm64 -p 8000:8000 spoolman:arm64
          echo "Waiting for the arm64 container to serve /api/v1/health (QEMU is slow)..."
          ok=0
          for i in $(seq 1 72); do
            if curl -sf http://localhost:8000/api/v1/health >/dev/null 2>&1; then
              echo "arm64 image is up and serving the API"; ok=1; break
            fi
            if [ "$(docker inspect -f '{{.State.Running}}' spoolman-arm64 2>/dev/null)" != "true" ]; then
              echo "container exited before becoming ready"; break
            fi
            sleep 5
          done
          echo "----- container logs -----"
          docker logs spoolman-arm64 || true
          docker rm -f spoolman-arm64 >/dev/null 2>&1 || true
          if [ "$ok" != "1" ]; then
            echo "::error::arm64 smoke test failed: API did not respond on /api/v1/health"
            exit 1
          fi
  #
  # Build the arm/v7 (32-bit ARM) image, then boot it under QEMU and hit the
  # health endpoint. armv7 has scarce native wheels and the image carries no Rust
  # toolchain, so a dependency bump can break it in ways amd64 never sees. We run
  # this on pull requests too (build only caches/publishes on push) so 32-bit
  # regressions are caught before merge, not just "does it compile".
  #
  build-armv7:
    needs: [build-client]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7


      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to the Github Container registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and cache Docker image
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          platforms: linux/arm/v7
          tags: spoolman:armv7
          load: true
          cache-from: type=registry,ref=ghcr.io/${{ env.GHCR_IMAGE }}:buildcache-armv7
          cache-to: type=registry,ref=ghcr.io/${{ env.GHCR_IMAGE }}:buildcache-armv7,mode=max

      # Pull requests can't write the registry build cache, so build cache-from only.
      - name: Build Docker image (PR)
        if: ${{ github.event_name == 'pull_request' }}
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          platforms: linux/arm/v7
          tags: spoolman:armv7
          load: true
          cache-from: type=registry,ref=ghcr.io/${{ env.GHCR_IMAGE }}:buildcache-armv7

      # Boot the 32-bit image under emulation and wait for the API to answer. This
      # runs the startup migrations and exercises the native wheels (pydantic-core,
      # SQLAlchemy, aiosqlite, ...) on real armv7 against the default SQLite backend.
      - name: Smoke-test the armv7 image
        run: |
          docker run -d --name spoolman-armv7 --platform linux/arm/v7 -p 8000:8000 spoolman:armv7
          echo "Waiting for the armv7 container to serve /api/v1/health (QEMU is slow)..."
          ok=0
          for i in $(seq 1 72); do
            if curl -sf http://localhost:8000/api/v1/health >/dev/null 2>&1; then
              echo "armv7 image is up and serving the API"; ok=1; break
            fi
            if [ "$(docker inspect -f '{{.State.Running}}' spoolman-armv7 2>/dev/null)" != "true" ]; then
              echo "container exited before becoming ready"; break
            fi
            sleep 5
          done
          echo "----- container logs -----"
          docker logs spoolman-armv7 || true
          docker rm -f spoolman-armv7 >/dev/null 2>&1 || true
          if [ "$ok" != "1" ]; then
            echo "::error::armv7 smoke test failed: API did not respond on /api/v1/health"
            exit 1
          fi
  #
  # Release images GHCR and Docker Hub if tests pass
  # Don't run this for pull requests
  #
  publish-images:
    if: ${{ github.event_name != 'pull_request' }}
    # Every test suite gates the release: without unit-tests/client-tests/e2e here, a tag
    # push minted :latest images (and the GitHub release + deploy downstream) even when
    # those suites were red — they ran as siblings, and a failing sibling doesn't stop
    # independent jobs.
    needs: [test, unit-tests, client-tests, e2e, build-amd64, build-arm64, build-armv7, style, build-client]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7


      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to the Github Container registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for GHCR
        id: meta-ghcr
        uses: docker/metadata-action@v6.1.0
        with:
          flavor: |
            latest=false
          images: |
            ghcr.io/${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=edge
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Extract metadata (tags, labels) for Docker Hub
        id: meta-dh
        uses: docker/metadata-action@v6.1.0
        with:
          flavor: |
            latest=false
          images: |
            docker.io/cookiemonster95/spoolman-ng
          tags: |
            type=raw,value=edge
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Log in to DockerHub
        uses: docker/login-action@v4.2.0
        with:
          registry: docker.io
          username: cookiemonster95
          password: ${{ secrets.REMOTE_REGISTRY_PASSWORD }}
    
      - name: Store git commit and build date
        run: |
          echo "GIT_COMMIT=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_ENV"

      - name: Build and push Docker images
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ${{ steps.meta-ghcr.outputs.tags }}
            ${{ steps.meta-dh.outputs.tags }}
          labels: ${{ steps.meta-ghcr.outputs.labels }}
          build-args: |
            GIT_COMMIT
            BUILD_DATE
          cache-from: |
            type=registry,ref=ghcr.io/${{ env.GHCR_IMAGE }}:buildcache-amd64
            type=registry,ref=ghcr.io/${{ env.GHCR_IMAGE }}:buildcache-arm64
            type=registry,ref=ghcr.io/${{ env.GHCR_IMAGE }}:buildcache-armv7
  #
  # Android companion app APK (mobile/) for the GitHub release. Delegates to
  # the standalone Mobile APK workflow (also runnable via workflow_dispatch);
  # publish-release attaches the artifact and tolerates this job failing — a
  # broken app build must not block a server release.
  #
  build-apk:
    if: ${{ (github.event_name != 'pull_request') && startsWith(github.event.ref, 'refs/tags/v') }}
    uses: ./.github/workflows/mobile-apk.yml
    secrets: inherit
  #
  # Create Github Release if CI was triggered by a tag
  #
  publish-release:
    # always() so a failed build-apk doesn't cancel the release; the release
    # itself still requires the Docker images to have published.
    if: ${{ always() && (github.event_name != 'pull_request') && startsWith(github.event.ref, 'refs/tags/v') && needs.publish-images.result == 'success' }}
    needs: [publish-images, build-apk]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built spoolman
        uses: actions/download-artifact@v8.0.1
        with:
          name: spoolman
          path: /tmp/spoolman

      - name: Download companion APK (absent when its build failed)
        uses: actions/download-artifact@v8.0.1
        continue-on-error: true
        with:
          name: companion-apk
          path: /tmp/companion-apk
      
      - name: Generate release info
        run: |
          cd /tmp/spoolman
          echo '{
            "project_name": "Spoolman NG",
            "project_owner": "${{ github.repository_owner }}",
            "version": "${{ github.ref_name }}",
            "asset_name": "spoolman.zip"
          }' > release_info.json

      - name: Zip
        run: |
          cd /tmp/spoolman
          zip -r spoolman.zip .

      - name: Compute image version tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create release and upload build
        uses: softprops/action-gh-release@v3
        id: create-release
        with:
          draft: false
          name: Spoolman NG ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            /tmp/spoolman/spoolman.zip
            /tmp/companion-apk/*.apk
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
          body: |
            **Spoolman NG** — a community-maintained continuation of [Spoolman](https://github.com/Donkie/Spoolman).

            > ⚠️ **Before upgrading:** Spoolman applies database migrations automatically on startup. **Back up your database first** so you can roll back if needed.

            ### Docker images
            Multi-arch images are published to GHCR and Docker Hub:
            ```
            docker pull ghcr.io/${{ env.GHCR_IMAGE }}:${{ steps.ver.outputs.version }}
            docker pull docker.io/cookiemonster95/spoolman-ng:${{ steps.ver.outputs.version }}
            ```
            Also tagged `:latest` (newest release) and `:edge` (latest `master`). Architectures: `amd64`, `arm64`, and `armv7` (all with NFC support).

            ### Android companion app (proof of concept)
            When attached below, `spoolman-companion-*.apk` is the sideloadable Android companion app: the full web UI plus **native QR/barcode and NFC scanning**, working against plain-HTTP LAN servers with no TLS setup. Install it directly or track releases with [Obtainium](https://github.com/ImranR98/Obtainium) — details in [mobile/README.md](https://github.com/${{ github.repository }}/blob/master/mobile/README.md).

            ---
  #
  # Keep the Home Assistant add-on repository (sherrmann/spoolman-ng-addons) in step
  # with each release: HA only offers add-on updates when the add-on's config.yaml
  # version changes, and its build.yaml must point at the matching image tag. Runs
  # after the images exist so an HA instance never gets offered a version whose image
  # isn't pullable yet. Requires secrets.PAT to have write access to the add-on repo.
  #
  sync-ha-addon:
    if: ${{ (github.event_name != 'pull_request') && startsWith(github.event.ref, 'refs/tags/v') }}
    needs: [publish-images]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout add-on repository
        uses: actions/checkout@v7
        with:
          repository: sherrmann/spoolman-ng-addons
          token: ${{ secrets.PAT }}

      - name: Bump add-on to this release
        run: |
          ver="${GITHUB_REF_NAME#v}"
          sed -i "s/^version: \".*\"$/version: \"${ver}\"/" spoolman_ng/config.yaml
          sed -i -E "s|(ghcr\.io/sherrmann/spoolman-ng:)[^[:space:]]+|\1${ver}|g" spoolman_ng/build.yaml
          # Keep the add-on's Changelog tab current: insert this release's section before the
          # first existing one (idempotent — skipped when the section already exists).
          if [ -f spoolman_ng/CHANGELOG.md ] && ! grep -q "^## ${ver}\$" spoolman_ng/CHANGELOG.md; then
            awk -v ver="${ver}" '
              /^## / && !done { printf "## %s\n\n- Server changes: <https://github.com/sherrmann/Spoolman-NG/releases/tag/v%s>\n\n", ver, ver; done=1 }
              { print }
            ' spoolman_ng/CHANGELOG.md > /tmp/addon-changelog.md
            mv /tmp/addon-changelog.md spoolman_ng/CHANGELOG.md
          fi
          if git diff --quiet; then
            echo "Add-on already at ${ver}; nothing to push."
            exit 0
          fi
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR_ID}+${GITHUB_ACTOR}@users.noreply.github.com"
          git commit -am "Bump Spoolman NG add-on to ${ver}"
          git push
  #
  # Deploy the freshly published :edge image to the spoolman-ng test instance
  # on the VPS. The SSH key is forced-command — the server runs
  # /opt/spoolman-ng/deploy.sh no matter what script is sent. PR runs never
  # reach this (no secrets on pull_request + the explicit if).
  #
  deploy-test:
    if: ${{ github.event_name != 'pull_request' }}
    needs: [publish-images]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to spoolman-ng
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            true # forced-command key runs /opt/spoolman-ng/deploy.sh regardless
