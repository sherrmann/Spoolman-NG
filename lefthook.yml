pre-commit:
  parallel: true
  jobs:
    - group: # Backend checks
        parallel: false
        jobs:
          - name: Run lint check on backend files
            run: uv run ruff check --fix .
            stage_fixed: true
          - name: Run format check on backend files
            run: uv run ruff format .
            stage_fixed: true
          - name: Check UV lockfile consistency
            run: uv lock --check
    - group: # Client checks
        parallel: false
        jobs:
          - name: Run lint check on client files
            root: "client/"
            run: ./node_modules/.bin/eslint --fix . # Hardcoded path because Windows messes up if we use npx
            stage_fixed: true
          - name: Run format check on client files
            root: "client/"
            run: ./node_modules/.bin/prettier --write .
            stage_fixed: true

# No pre-push test gate: CI runs the full suites on every PR, and running them twice
# (locally on push + in the workflows) buys little. Tried and deliberately removed —
# see issue #357 for the history (slow-gate → testmon → removed).

# Same as pre-commit but no fixes
ci:
  parallel: true
  jobs:
    - group: # Backend checks
        parallel: false
        jobs:
          - name: Run lint check on backend files
            run: uv run ruff check .
          - name: Run format check on backend files
            run: uv run ruff format --check .
          - name: Check UV lockfile consistency
            run: uv lock --check
    - group: # Client checks
        parallel: false
        jobs:
          - name: Run lint check on client files
            root: "client/"
            run: ./node_modules/.bin/eslint . # Hardcoded path because Windows messes up if we use npx
          - name: Run format check on client files
            root: "client/"
            run: ./node_modules/.bin/prettier --check .
          - name: Run type check on client files
            root: "client/"
            run: npx tsc --noEmit
          - name: Validate client i18n translations
            root: "client/"
            run: npm run check-i18n

