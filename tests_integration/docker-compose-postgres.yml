services:
  db:
    image: postgres:11-alpine
    environment:
      - POSTGRES_PASSWORD=abc
      - TZ='GMT+4'
      - PGTZ='GMT+4'
  spoolman:
    image: spoolman:test
    environment:
      - SPOOLMAN_DB_TYPE=postgres
      - SPOOLMAN_DB_HOST=db
      - SPOOLMAN_DB_PORT=5432
      - SPOOLMAN_DB_NAME=postgres
      - SPOOLMAN_DB_USERNAME=postgres
      - SPOOLMAN_DB_PASSWORD=abc
      # Exercise SPOOLMAN_DB_SCHEMA (#78) in CI: the whole postgres integration run happens against a
      # non-default schema, which the app must create and migrate into.
      - SPOOLMAN_DB_SCHEMA=spoolman_test
      - SPOOLMAN_LOGGING_LEVEL=INFO
      - TZ=Europe/Stockholm
    depends_on:
      - db
  tester:
    image: spoolman-tester:latest
    volumes:
      - ./tests:/tester/tests
    environment:
      - DB_TYPE=postgres
    depends_on:
      - spoolman
